name: discovery_agent
model: claude-haiku-4-5-20251001
provider: anthropic
description: >
  Given a product name, URL, image, or niche-market query, identifies the
  product's category, subcategory, normalized keywords, target niche, and
  IP red flags.  For niche queries, returns a shortlist of 3-5 distinct
  product candidates.  Produces ProductIdentity ready for storage.

tools:
  - product_page_scraper
  - reverse_image_search
  - vision_model_client

input:
  type: object
  properties:
    input_type:
      type: string
      enum: [text, url, image, niche_query]
    value:
      type: string

output:
  type: object
  schema: ProductIdentity
